<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stick Figure Game</title>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #87ceeb; border: 2px solid #333; }
    #info { position: absolute; top: 10px; color: white; font-family: sans-serif; font-size: 14px; text-align: center; }
  </style>
</head>
<body>
  <div id="info">Arrow keys or WASD to move &nbsp;|&nbsp; Space / Up to jump</div>
  <canvas id="canvas" width="800" height="500"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const platforms = [
      { x: 0,   y: 440, w: 800, h: 20 },  // ground
      { x: 150, y: 310, w: 180, h: 15 },  // left platform
      { x: 460, y: 220, w: 180, h: 15 },  // right platform
    ];

    const player = {
      x: 100, y: 380,
      w: 20, h: 50,
      vx: 0, vy: 0,
      onGround: false,
      facing: 1,  // 1 = right, -1 = left
      // leg animation
      legAngle: 0,
      legDir: 1,
    };

    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup',   e => keys[e.code] = false);

    const SPEED = 3.5;
    const JUMP  = -11;
    const GRAV  = 0.45;

    function update() {
      // horizontal
      const left  = keys['ArrowLeft']  || keys['KeyA'];
      const right = keys['ArrowRight'] || keys['KeyD'];
      const jump  = keys['ArrowUp']    || keys['KeyW'] || keys['Space'];

      if (left)  { player.vx = -SPEED; player.facing = -1; }
      else if (right) { player.vx =  SPEED; player.facing =  1; }
      else player.vx = 0;

      if (jump && player.onGround) player.vy = JUMP;

      player.vy += GRAV;
      player.x  += player.vx;
      player.y  += player.vy;

      // animate legs when moving
      if (player.vx !== 0 && player.onGround) {
        player.legAngle += 0.15 * player.legDir;
        if (Math.abs(player.legAngle) > 0.5) player.legDir *= -1;
      } else {
        player.legAngle *= 0.8;
      }

      // clamp to canvas
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

      // platform collisions
      player.onGround = false;
      for (const p of platforms) {
        const feet = player.y + player.h;
        if (
          player.x + player.w > p.x &&
          player.x < p.x + p.w &&
          feet >= p.y &&
          feet <= p.y + p.h + Math.abs(player.vy) + 1 &&
          player.vy >= 0
        ) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }

      // fell off screen
      if (player.y > canvas.height + 100) {
        player.x = 100; player.y = 380; player.vx = 0; player.vy = 0;
      }
    }

    function drawStickFigure(x, y, facing, legAngle) {
      const cx = x + 10; // center x of bounding box
      ctx.save();
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';

      // head
      ctx.beginPath();
      ctx.arc(cx, y + 10, 8, 0, Math.PI * 2);
      ctx.stroke();

      // body
      ctx.beginPath();
      ctx.moveTo(cx, y + 18);
      ctx.lineTo(cx, y + 35);
      ctx.stroke();

      // arms
      ctx.beginPath();
      ctx.moveTo(cx - 10, y + 22);
      ctx.lineTo(cx + 10, y + 22);
      ctx.stroke();

      // legs
      const lx = cx;
      const ly = y + 35;
      const legLen = 15;

      // left leg
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + Math.sin(-legAngle) * legLen, ly + Math.cos(legAngle) * legLen);
      ctx.stroke();

      // right leg
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + Math.sin(legAngle) * legLen, ly + Math.cos(legAngle) * legLen);
      ctx.stroke();

      ctx.restore();
    }

    function drawPlatform(p) {
      ctx.fillStyle = '#5a3e2b';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // grass top
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(p.x, p.y, p.w, 5);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // sky gradient
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, '#87ceeb');
      sky.addColorStop(1, '#d4f1ff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // clouds
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      [[120,80,50,25],[350,50,70,30],[600,90,55,22]].forEach(([x,y,w,h]) => {
        ctx.beginPath();
        ctx.ellipse(x, y, w, h, 0, 0, Math.PI*2);
        ctx.fill();
      });

      platforms.forEach(drawPlatform);
      drawStickFigure(player.x, player.y, player.facing, player.legAngle);
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
